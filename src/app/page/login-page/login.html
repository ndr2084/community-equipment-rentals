<div class="login-page">

  <div class="company-graphics">
    <div class="login-title-container">
      <h1 class="login-title">Community </h1>
      <h1 class="login-title">Equipment</h1>
      <h1 class="login-title">Rentals</h1>
    </div>
  </div>


  <div class="login-form-container">

    <div class="mobile-login-form-components-container">

      <div class="mobile-login-title-container">
        <h1 class="login-title-mobile">Community</h1>
        <h1 class="login-title-mobile">Equipment</h1>
        <h1 class="login-title-mobile">Rentals</h1>
      </div>

      <app-container>
        <form [formGroup]="profileForm" class="login-form">
          <h1 id="login-header">Login</h1>
          <label for="first-name"></label>
          <input class="default-input" type="text" formControlName="firstName" placeholder="First Name *" />
          <label for="last-name"></label>
          <input class="default-input" type="text" formControlName="lastName" placeholder="Last Name" />
          <label for="last-name"></label>
          <input class="default-input" type="text" formControlName="discordUsername" placeholder="Discord Username *" />
          <input type="submit" value="Submit" class=" default-button primary">
        </form>
      </app-container>
    </div>
  </div>

</div>
